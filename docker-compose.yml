services:
  postgres:
    image: postgres:16-alpine
    container_name: educore-postgres
    environment:
      POSTGRES_DB: educore
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore
    ports:
      - '5432:5432'
    volumes:
      - educore_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: educore-redis
    ports:
      - '6379:6379'
    volumes:
      - educore_redis_data:/data

volumes:
  educore_postgres_data:
  educore_redis_data:

